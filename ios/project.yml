name: LaughTrack
options:
  bundleIdPrefix: com.laughtrack
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.3"
packages:
  ios-libs:
    url: https://github.com/gioe/ios-libs.git
    revision: 628c35737cd8984b311d6888b46c09b15ffebcc8
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.9.0"
  swift-http-types:
    url: https://github.com/apple/swift-http-types
    from: "1.0.0"
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.2.0"
targets:
  LaughTrackCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackCore
    dependencies:
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.core
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrackBridge:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackBridge
    dependencies:
      - package: ios-libs
        product: SharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.bridge
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrackAPIClient:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackAPIClient
        excludes:
          - openapi.json
          - openapi-generator-config.yaml
    dependencies:
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.apiclient
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrack:
    type: application
    platform: iOS
    sources:
      - path: Sources/LaughTrackApp
    dependencies:
      - target: LaughTrackCore
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.app
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_EMIT_LOC_STRINGS: "YES"
  LaughTrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
        createIntermediateGroups: true
        optional: true
    dependencies:
      - target: LaughTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: LaughTrack
