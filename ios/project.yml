name: LaughTrack
options:
  bundleIdPrefix: com.laughtrack
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.3"
packages:
  ios-libs:
    url: https://github.com/gioe/ios-libs.git
    revision: 8fc3189e4a0a2210bcf383417c2b49aac18379fe
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.9.0"
  swift-http-types:
    url: https://github.com/apple/swift-http-types
    from: "1.0.0"
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.2.0"
targets:
  LaughTrackCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackCore
    dependencies:
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.core
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrackBridge:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackBridge
    dependencies:
      - package: ios-libs
        product: SharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.bridge
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrackAPIClient:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackAPIClient
        excludes:
          - openapi.json
          - openapi-generator-config.yaml
    dependencies:
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.apiclient
        GENERATE_INFOPLIST_FILE: "YES"
  LaughTrack:
    type: application
    platform: iOS
    sources:
      - path: Sources/LaughTrackApp
    info:
      path: Sources/LaughTrackApp/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.laughtrack.app.auth
            CFBundleURLSchemes:
              - laughtrack
        NSLocationWhenInUseUsageDescription: LaughTrack uses your location to find nearby comedy shows without forcing manual ZIP entry.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        NSLocationWhenInUseUsageDescription: LaughTrack uses your location to find nearby comedy shows and match it to a 5-digit ZIP code.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
    dependencies:
      - target: LaughTrackCore
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.app
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    scheme:
      testTargets:
        - LaughTrackTests
  LaughTrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LaughTrackTests
        createIntermediateGroups: true
        # Narrow allowlist: other files in Tests/LaughTrackTests/ have
        # pre-existing compile errors. TASK-1740 tracks repairing them;
        # add each file here as it becomes buildable.
        includes:
          - LaughTrackTests.swift
          - ServiceRegistrationTests.swift
    dependencies:
      - target: LaughTrack
      - target: LaughTrackCore
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
