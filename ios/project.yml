name: LaughTrack
options:
  bundleIdPrefix: com.laughtrack
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.3"
packages:
  ios-libs:
    url: https://github.com/gioe/ios-libs.git
    revision: 409ad92db9ab062382390f79063cd90429cc8a5d
  swift-openapi-runtime:
    url: https://github.com/apple/swift-openapi-runtime
    from: "1.9.0"
  swift-http-types:
    url: https://github.com/apple/swift-http-types
    from: "1.0.0"
  swift-openapi-urlsession:
    url: https://github.com/apple/swift-openapi-urlsession
    from: "1.2.0"
targets:
  LaughTrackCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackCore
    dependencies:
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.core
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
  LaughTrackBridge:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackBridge
    dependencies:
      - package: ios-libs
        product: SharedKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.bridge
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
  LaughTrackAPIClient:
    type: framework
    platform: iOS
    sources:
      - path: Sources/LaughTrackAPIClient
        excludes:
          - openapi.json
          - openapi-generator-config.yaml
    dependencies:
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.apiclient
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
  LaughTrack:
    type: application
    platform: iOS
    sources:
      - path: Sources/LaughTrackApp
      - path: Resources
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Sources/LaughTrackApp/Info.plist
      properties:
        # Drive build/marketing version from project.yml build settings (CURRENT_PROJECT_VERSION /
        # MARKETING_VERSION). Without these explicit overrides xcodegen materializes the
        # build-setting values as literal strings into Info.plist on every regen, silently
        # downgrading whatever fastlane wrote (TASK-1902).
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.laughtrack.app.auth
            CFBundleURLSchemes:
              - laughtrack
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        NSLocationWhenInUseUsageDescription: LaughTrack uses your location to find nearby comedy shows and match it to a 5-digit ZIP code.
        NSCalendarsUsageDescription: LaughTrack adds comedy shows you choose to your calendar.
        NSCalendarsWriteOnlyAccessUsageDescription: LaughTrack adds comedy shows you choose to your calendar.
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
    dependencies:
      - target: LaughTrackCore
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
      - package: swift-openapi-urlsession
        product: OpenAPIURLSession
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.laughtrack.ios
        DEVELOPMENT_TEAM: 4HDNC3V5Q6
        # PRODUCT_MODULE_NAME is intentionally LaughTrackApp (not the target name
        # LaughTrack) so `@testable import LaughTrackApp` works in both SPM
        # (where the target is named LaughTrackApp) and Xcode. Aligning the
        # Swift module name across both build systems lets the same test files
        # build under `swift test` and `xcodebuild test`.
        PRODUCT_MODULE_NAME: LaughTrackApp
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_EMIT_LOC_STRINGS: "YES"
    scheme:
      testTargets:
        - LaughTrackTests
        - LaughTrackUITests
  LaughTrackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LaughTrackTests
        createIntermediateGroups: true
    dependencies:
      - target: LaughTrack
      - target: LaughTrackCore
      - target: LaughTrackBridge
      - target: LaughTrackAPIClient
      - package: ios-libs
        product: SharedKit
      - package: ios-libs
        product: APIClient
      - package: swift-openapi-runtime
        product: OpenAPIRuntime
      - package: swift-http-types
        product: HTTPTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
  LaughTrackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/LaughTrackUITests
        createIntermediateGroups: true
    dependencies:
      - target: LaughTrack
      - package: ios-libs
        product: SharedKitTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.laughtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        TEST_TARGET_NAME: LaughTrack
