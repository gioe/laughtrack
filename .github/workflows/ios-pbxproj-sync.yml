name: iOS pbxproj sync

on:
  push:
    branches: [main]
    paths:
      - "ios/Sources/**/*.swift"
      - "ios/LaughTrack.xcodeproj/project.pbxproj"
      - "ios/bin/check-pbxproj-sync.sh"
      - ".github/workflows/ios-pbxproj-sync.yml"
  pull_request:
    branches: [main]
    paths:
      - "ios/Sources/**/*.swift"
      - "ios/LaughTrack.xcodeproj/project.pbxproj"
      - "ios/bin/check-pbxproj-sync.sh"
      - ".github/workflows/ios-pbxproj-sync.yml"

jobs:
  check-pbxproj:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify every ios/Sources/**/*.swift is wired into project.pbxproj
        run: ios/bin/check-pbxproj-sync.sh
