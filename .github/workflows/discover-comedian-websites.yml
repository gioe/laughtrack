name: Discover Comedian Websites

on:
  schedule:
    # Daily at 10:00 UTC (06:00 ET / 02:00 PT)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Discover comedian websites
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ENGINE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.discover_comedian_websites --limit 33 -v

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discover-comedian-websites-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Ping heartbeat monitor
        if: always()
        env:
          DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL: ${{ secrets.DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL }}
        run: |
          if [ -z "$DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL" ]; then
            echo "DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL not set — skipping heartbeat ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS --retry 3 --max-time 10 "$DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL"
          else
            curl -fsS --retry 3 --max-time 10 "$DISCOVER_WEBSITES_HEALTHCHECKS_PING_URL/fail"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Comedian website discovery failed. Check the logs artifact for details."
          echo "GitHub will send an email notification to repository administrators."
