name: Check Comedian Website Health

on:
  schedule:
    # Weekly on Monday at 09:00 UTC, before daily website discovery.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Check comedian website URL health
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: |
          python -m scripts.core.check_comedian_website_health -v

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: check-comedian-website-health-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Record pipeline run
        if: always()
        continue-on-error: true
        env:
          GITHUB_JOB_STATUS: ${{ job.status }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: |
          python -m scripts.core.record_pipeline_run --status "$GITHUB_JOB_STATUS"
