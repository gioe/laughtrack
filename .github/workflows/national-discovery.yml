name: National Venue Discovery

on:
  schedule:
    # Weekly on Sunday at 07:00 UTC (03:00 ET / 23:00 PT Sat)
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Discover SeatEngine v3 venues
        id: seatengine_v3
        continue-on-error: true
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          SEATENGINE_AUTH_TOKEN: ${{ secrets.SEATENGINE_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.scrape_shows --scraper-type seatengine_v3_national

      - name: Discover SeatEngine v1 venues
        id: seatengine_v1
        continue-on-error: true
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          SEATENGINE_AUTH_TOKEN: ${{ secrets.SEATENGINE_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.scrape_shows --scraper-type seatengine_national

      - name: Discover Ticketmaster venues
        id: ticketmaster
        continue-on-error: true
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.scrape_shows --scraper-type ticketmaster_national

      - name: Upload scraper logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: national-discovery-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Report discovery results
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FAILED_STEPS=()
          PASSED_STEPS=()

          [[ "${{ steps.seatengine_v3.outcome }}" == "failure" ]] && FAILED_STEPS+=("SeatEngine v3") || PASSED_STEPS+=("SeatEngine v3")
          [[ "${{ steps.seatengine_v1.outcome }}" == "failure" ]] && FAILED_STEPS+=("SeatEngine v1") || PASSED_STEPS+=("SeatEngine v1")
          [[ "${{ steps.ticketmaster.outcome }}"  == "failure" ]] && FAILED_STEPS+=("Ticketmaster")  || PASSED_STEPS+=("Ticketmaster")

          if [ ${#FAILED_STEPS[@]} -eq 0 ]; then
            echo "All discovery scrapers passed."
            exit 0
          fi

          FAILED_LIST=$(IFS=", "; echo "${FAILED_STEPS[*]}")
          PASSED_LIST=$(IFS=", "; echo "${PASSED_STEPS[*]}")

          if [ ${#FAILED_STEPS[@]} -eq 3 ]; then
            TITLE="🚨 National Discovery: All scrapers failed"
            echo "::error::All national discovery scrapers failed."
          else
            TITLE="⚠️ National Discovery: Partial failure"
            echo "::warning::Some national discovery scrapers failed: ${FAILED_LIST}"
          fi

          MSG="**Failed:** ${FAILED_LIST}"
          if [ ${#PASSED_STEPS[@]} -gt 0 ]; then
            MSG="${MSG} | **Passed:** ${PASSED_LIST}"
          fi

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"${TITLE} — ${MSG}. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}"
          fi

          if [ ${#FAILED_STEPS[@]} -eq 3 ]; then
            exit 1
          fi
