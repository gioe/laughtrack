name: CDN Image Audit

on:
  schedule:
    # Weekly on Monday at 09:00 UTC (05:00 ET / 01:00 PT)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run CDN image audit
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: |
          python -m scripts.core.audit_comedian_images --update

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cdn-image-audit-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Ping heartbeat monitor
        if: always()
        env:
          CDN_AUDIT_HEALTHCHECKS_PING_URL: ${{ secrets.CDN_AUDIT_HEALTHCHECKS_PING_URL }}
        run: |
          if [ -z "$CDN_AUDIT_HEALTHCHECKS_PING_URL" ]; then
            echo "CDN_AUDIT_HEALTHCHECKS_PING_URL not set — skipping heartbeat ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS --retry 3 --max-time 10 "$CDN_AUDIT_HEALTHCHECKS_PING_URL"
          else
            curl -fsS --retry 3 --max-time 10 "$CDN_AUDIT_HEALTHCHECKS_PING_URL/fail"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::CDN image audit failed. Check the logs artifact for details."
          echo "GitHub will send an email notification to repository administrators."
