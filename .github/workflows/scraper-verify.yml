name: Scraper Verify (Single Club)

on:
  workflow_dispatch:
    inputs:
      club_id:
        description: "Club ID to scrape (integer). Runs scrape_shows --club-id <id>."
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run scraper for single club
        id: run_scraper
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          EVENTBRITE_PRIVATE_TOKEN: ${{ secrets.EVENTBRITE_PRIVATE_TOKEN }}
          SEATENGINE_AUTH_TOKEN: ${{ secrets.SEATENGINE_AUTH_TOKEN }}
        run: |
          python -m scripts.core.scrape_shows --club-id ${{ inputs.club_id }} --verbose 2>&1 | tee scrape-output.log
          echo "--- tail summary ---"
          tail -5 scrape-output.log

      - name: Upload scrape output and dashboard
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-verify-club-${{ inputs.club_id }}-${{ github.run_id }}
          path: |
            apps/scraper/scrape-output.log
            apps/scraper/logs/
            apps/scraper/dashboard.html
            apps/scraper/metrics/
          retention-days: 14
