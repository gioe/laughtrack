name: Scraper Production Run

on:
  schedule:
    # Daily at 06:00 UTC (02:00 ET / 22:00 PT)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Only hash requirements.txt — dev deps are not installed in production
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run scraper
        id: run_scraper
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USERNAME: ${{ secrets.EMAIL_SMTP_USERNAME }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_SMTP_USE_TLS: ${{ secrets.EMAIL_SMTP_USE_TLS }}
          EMAIL_FROM_EMAIL: ${{ secrets.EMAIL_FROM_EMAIL }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          EVENTBRITE_PRIVATE_TOKEN: ${{ secrets.EVENTBRITE_PRIVATE_TOKEN }}
          SEATENGINE_AUTH_TOKEN: ${{ secrets.SEATENGINE_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.scrape_shows --all

      - name: Revalidate home page cache
        if: steps.run_scraper.outcome == 'success'
        continue-on-error: true
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          curl -fsS --retry 3 --max-time 15 \
            -X POST https://laugh-track.com/api/revalidate \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $REVALIDATE_SECRET" \
            -d '{"tags": ["home-page-data"]}'

      - name: Update popularity scores (comedians, shows, clubs)
        if: always()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # With no flags the script updates comedians → shows → clubs in the
          # correct dependency order (shows and clubs both aggregate comedian
          # popularity via lineups) in a single process.
          python -m scripts.core.update_popularity

      - name: Backfill club description and hours
        id: enrichment
        if: always()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          # Places fallback runs only when this key is set; the script's
          # GOOGLE_PLACES_DAILY_LIMIT (default 500) caps spend per run.
          # Unset secret => Places auto-disabled, no spend, no run failure.
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACES_DAILY_LIMIT: ${{ vars.GOOGLE_PLACES_DAILY_LIMIT || '500' }}
        run: |
          # Fills description/hours for any visible club still missing either
          # column.  Only re-fetches clubs that need an update, so nightly
          # re-runs are cheap once the backfill stabilises.
          #
          # Hours are sourced from the club's website first (LD-JSON / meta);
          # clubs still missing hours fall back to Google Places API when
          # GOOGLE_PLACES_API_KEY is configured.
          #
          # tee stdout to enrichment-summary.txt so the next step can parse
          # the final JSON line ({fetched, written, description_hits, ...})
          # and post a compact report to Discord.
          python -m scripts.core.update_club_enrichment | tee enrichment-summary.txt

      - name: Post enrichment summary to Discord
        if: always()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          if [ ! -s enrichment-summary.txt ]; then
            echo "No enrichment output captured (step failed before printing summary) — skipping"
            exit 0
          fi
          # The script emits its JSON summary as the final stdout line via
          # print(json.dumps(summary)). Earlier lines are Logger output.
          SUMMARY=$(tail -n1 enrichment-summary.txt)
          if ! echo "$SUMMARY" | jq empty >/dev/null 2>&1; then
            echo "Enrichment summary not valid JSON — skipping Discord post"
            echo "Last line was: $SUMMARY"
            exit 0
          fi
          FETCHED=$(echo "$SUMMARY" | jq -r '.fetched // 0')
          WRITTEN=$(echo "$SUMMARY" | jq -r '.written // 0')
          DESC=$(echo "$SUMMARY" | jq -r '.description_hits // 0')
          HOURS=$(echo "$SUMMARY" | jq -r '.hours_hits // 0')
          HOURS_LDJSON=$(echo "$SUMMARY" | jq -r '.hours_from_ldjson // 0')
          HOURS_PLACES=$(echo "$SUMMARY" | jq -r '.hours_from_places // 0')
          PLACES_CALLS=$(echo "$SUMMARY" | jq -r '.places_calls // 0')
          MSG="[enrichment] fetched ${FETCHED}, wrote ${WRITTEN} (desc=${DESC}, hours=${HOURS} [ldjson=${HOURS_LDJSON}, places=${HOURS_PLACES}], places_calls=${PLACES_CALLS})"
          curl -fsS --retry 3 --max-time 10 -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "$MSG" '{content: $c}')"

      - name: Backfill comedian bios
        id: comedian_bios
        if: always()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: |
          # Fills Comedian.bio for comedians still missing one, in popularity
          # order.  Capped per run to stay under Wikipedia's unauthenticated
          # IP throttle — the backlog drains across subsequent nightlies.
          python -m scripts.core.update_comedian_bios --limit 500 \
            | tee comedian-bios-summary.txt

      - name: Post comedian bios summary to Discord
        if: always()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          if [ ! -s comedian-bios-summary.txt ]; then
            echo "No comedian-bios output captured — skipping"
            exit 0
          fi
          SUMMARY=$(tail -n1 comedian-bios-summary.txt)
          if ! echo "$SUMMARY" | jq empty >/dev/null 2>&1; then
            echo "comedian-bios summary not valid JSON — skipping Discord post"
            echo "Last line was: $SUMMARY"
            exit 0
          fi
          FETCHED=$(echo "$SUMMARY" | jq -r '.fetched // 0')
          WRITTEN=$(echo "$SUMMARY" | jq -r '.written // 0')
          NOT_FOUND=$(echo "$SUMMARY" | jq -r '.not_found // 0')
          DISAMBIG=$(echo "$SUMMARY" | jq -r '.disambiguation // 0')
          NOT_COMEDIAN=$(echo "$SUMMARY" | jq -r '.not_comedian // 0')
          FAILED=$(echo "$SUMMARY" | jq -r '.fetch_failed // 0')
          MSG="[comedian-bios] fetched ${FETCHED}, wrote ${WRITTEN} (not_found=${NOT_FOUND}, disambig=${DISAMBIG}, not_comedian=${NOT_COMEDIAN}, failed=${FAILED})"
          curl -fsS --retry 3 --max-time 10 -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "$MSG" '{content: $c}')"

      - name: Send comedian arrival notifications
        if: always()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USERNAME: ${{ secrets.EMAIL_SMTP_USERNAME }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_SMTP_USE_TLS: ${{ secrets.EMAIL_SMTP_USE_TLS }}
          EMAIL_FROM_EMAIL: ${{ secrets.EMAIL_FROM_EMAIL }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          python -m laughtrack.app.cli notify-comedian-arrivals --radius 50 --days-ahead 30

      - name: Upload scraper logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Upload scraper dashboard and metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-dashboard-${{ github.run_id }}
          path: |
            apps/scraper/dashboard.html
            apps/scraper/metrics/
          retention-days: 30

      - name: Ping heartbeat monitor
        if: always()
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: |
          # Sends a heartbeat ping to an external monitoring service (e.g. Healthchecks.io free tier).
          # Healthchecks.io alerts via email/Discord if no ping arrives within the grace window,
          # which catches both failed runs and completely missed scheduled runs.
          #
          # Setup:
          #   1. Create a free account at https://healthchecks.io
          #   2. Add a check: period=1d, grace=12h, schedule=0 6 * * *
          #   3. Add the ping URL as a GitHub secret named HEALTHCHECKS_PING_URL
          #   4. Optionally connect a Discord channel in Healthchecks.io integrations
          if [ -z "$HEALTHCHECKS_PING_URL" ]; then
            echo "HEALTHCHECKS_PING_URL not set — skipping heartbeat ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS --retry 3 --max-time 10 "$HEALTHCHECKS_PING_URL"
          else
            curl -fsS --retry 3 --max-time 10 "$HEALTHCHECKS_PING_URL/fail"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scraper production run failed. Check the logs artifact for details."
          echo "GitHub will send an email notification to repository administrators."
