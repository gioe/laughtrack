name: Scraper Production Run

on:
  schedule:
    # Daily at 06:00 UTC (02:00 ET / 22:00 PT)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Only hash requirements.txt — dev deps are not installed in production
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USERNAME: ${{ secrets.EMAIL_SMTP_USERNAME }}
          EMAIL_SMTP_PASSWORD: ${{ secrets.EMAIL_SMTP_PASSWORD }}
          EMAIL_SMTP_USE_TLS: ${{ secrets.EMAIL_SMTP_USE_TLS }}
          EMAIL_FROM_EMAIL: ${{ secrets.EMAIL_FROM_EMAIL }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          ALERT_RECIPIENTS: ${{ secrets.ALERT_RECIPIENTS }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          EVENTBRITE_PRIVATE_TOKEN: ${{ secrets.EVENTBRITE_PRIVATE_TOKEN }}
          SEATENGINE_AUTH_TOKEN: ${{ secrets.SEATENGINE_AUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.scrape_shows --all

      - name: Update comedian popularity scores
        if: always()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.update_popularity --comedians

      - name: Upload scraper logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Upload scraper dashboard and metrics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-dashboard-${{ github.run_id }}
          path: |
            apps/scraper/dashboard.html
            apps/scraper/metrics/
          retention-days: 30

      - name: Ping heartbeat monitor
        if: always()
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: |
          # Sends a heartbeat ping to an external monitoring service (e.g. Healthchecks.io free tier).
          # Healthchecks.io alerts via email/Discord if no ping arrives within the grace window,
          # which catches both failed runs and completely missed scheduled runs.
          #
          # Setup:
          #   1. Create a free account at https://healthchecks.io
          #   2. Add a check: period=1d, grace=12h, schedule=0 6 * * *
          #   3. Add the ping URL as a GitHub secret named HEALTHCHECKS_PING_URL
          #   4. Optionally connect a Discord channel in Healthchecks.io integrations
          if [ -z "$HEALTHCHECKS_PING_URL" ]; then
            echo "HEALTHCHECKS_PING_URL not set — skipping heartbeat ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS --retry 3 --max-time 10 "$HEALTHCHECKS_PING_URL"
          else
            curl -fsS --retry 3 --max-time 10 "$HEALTHCHECKS_PING_URL/fail"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Scraper production run failed. Check the logs artifact for details."
          echo "GitHub will send an email notification to repository administrators."
