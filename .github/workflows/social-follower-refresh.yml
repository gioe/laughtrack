name: Social Follower Refresh

on:
  schedule:
    # Bi-weekly: 1st and 15th of each month at 08:00 UTC (04:00 ET / 00:00 PT)
    - cron: '0 8 1,15 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        working-directory: apps/scraper

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('apps/scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Refresh social follower counts
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          INSTAGRAM_APP_ID: ${{ secrets.INSTAGRAM_APP_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m scripts.core.refresh_social_followers --platform youtube

      - name: Update comedian popularity scores
        if: success()
        env:
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
        run: |
          python -m scripts.core.update_popularity --comedians

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: social-follower-refresh-logs-${{ github.run_id }}
          path: apps/scraper/logs/
          retention-days: 30

      - name: Ping heartbeat monitor
        if: always()
        env:
          SOCIAL_REFRESH_HEALTHCHECKS_PING_URL: ${{ secrets.SOCIAL_REFRESH_HEALTHCHECKS_PING_URL }}
        run: |
          # Sends a heartbeat ping to an external monitoring service (e.g. Healthchecks.io free tier).
          # Healthchecks.io alerts via email/Discord if no ping arrives within the grace window,
          # which catches both failed runs and completely missed scheduled runs.
          #
          # Setup:
          #   1. Create a free account at https://healthchecks.io
          #   2. Add a check: period=1w, grace=12h, schedule=0 8 * * 0
          #   3. Add the ping URL as a GitHub secret named SOCIAL_REFRESH_HEALTHCHECKS_PING_URL
          #   4. Optionally connect a Discord channel in Healthchecks.io integrations
          if [ -z "$SOCIAL_REFRESH_HEALTHCHECKS_PING_URL" ]; then
            echo "SOCIAL_REFRESH_HEALTHCHECKS_PING_URL not set — skipping heartbeat ping"
            exit 0
          fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS --retry 3 --max-time 10 "$SOCIAL_REFRESH_HEALTHCHECKS_PING_URL"
          else
            curl -fsS --retry 3 --max-time 10 "$SOCIAL_REFRESH_HEALTHCHECKS_PING_URL/fail"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Social follower refresh failed. Check the logs artifact for details."
          echo "GitHub will send an email notification to repository administrators."
