# Club quality deny rules — add new patterns here without a code change.
# All rules are evaluated before any new club is inserted via the discovery pipeline.

# Reject clubs whose name starts with any of these prefixes (case-sensitive —
# add lowercase variants explicitly if needed, e.g. "test ").
# "Demo " covers both "Demo Comedy Club" and "Demo - Austin", so "Demo -" is omitted.
name_prefix_deny:
  - "Event #"
  - "Test "
  - "Demo "

# Reject clubs whose website matches one of these exact strings (after stripping whitespace).
website_deny_exact:
  - "#"
  - ""

# Reject clubs whose website hostname matches one of these exact hostnames or
# fnmatch-style glob patterns (evaluated after parsing the URL).
website_hostname_deny:
  exact:
    - "testcenter.seatengine.com"
    - "developmenttestsite.seatengine.com"
  glob:
    - "demo-*.seatengine.com"

# Reject clubs whose name exactly matches any of these entries (case-sensitive).
# Used to deny-list non-comedy venues that were bulk-imported without research.
name_exact_deny:
  - "test 2"
  - "Events by KathySings4u"
  - "Fiesta De Independencia"
  - "FUNCHAMANIA!"
  - "I Am Battle Comic | Hermosa Beach Community Theater"
  - "Submit to the 208 Comedy Festival Please"
  - "Suits for Soldiers"
  - "Wave Entertainment"
  - "Mike Gardner Comedy"
  - "Jess Miller Comedy Shows"
  - "MobRun Productions"
  - "Don Barnhart Entertainment"
  - "Bridgestones Comedy Shows"
  - "Mad Hatter Shows"
  - "Omaha Improv Festival (Workshops)"
  - "Grand Lodge of Texas"
  - "The Hotel Somerset-Bridgewater"
  - "MJ's Buttonwood"
  - "Don the Beachcomber"
  - "Tavola Ristorante"
  - "Food Precinct"
  - "208 Comedy Fest"
